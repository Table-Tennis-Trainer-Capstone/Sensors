armgroup:
  kinematics_solver: lma_kinematics_plugin/LMAKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3
  # Allow IK to succeed for any valid orientation at the target position.
  # Critical for setPositionTarget — without this, LMA still enforces the
  # orientation component and returns NO_IK_SOLUTION for reachable positions.
  position_only_ik: true
